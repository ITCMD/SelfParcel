# Works three ways:
#   1. Local / git-repo deploy (Komodo, Portainer "from repository"): the build
#      section compiles the image on the host. No registry needed.
#   2. Pre-built image: set SELFPARCEL_IMAGE to a registry tag and it's pulled.
#   3. Portainer web editor (no build context): it pulls SELFPARCEL_IMAGE, so a
#      published image is required there.
services:
  selfparcel:
    image: ${SELFPARCEL_IMAGE:-ghcr.io/OWNER/selfparcel:latest}
    build: .
    container_name: selfparcel
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      TZ: "${TZ:-UTC}"
      PORT: "8080"
      DATABASE_PATH: /data/selfparcel.sqlite
      POLL_INTERVAL_MINUTES: "30"
      MIN_REFRESH_MINUTES: "10"
      # All carriers scrape their public tracking page (stealth-hardened).
      SCRAPER_BROWSER_FALLBACK: "true"
      # For tough bot protection, point at a real external Chrome over CDP:
      BROWSER_CDP_URL: "${BROWSER_CDP_URL:-}"
      BROWSER_EXECUTABLE_PATH: "${BROWSER_EXECUTABLE_PATH:-}"
      BROWSER_HEADFUL: "${BROWSER_HEADFUL:-false}"
      # Authentication: none | local | oidc (default none = unprotected).
      AUTH_MODE: "${AUTH_MODE:-none}"
      AUTH_ENABLED: "${AUTH_ENABLED:-false}"
      OIDC_ISSUER: "${OIDC_ISSUER:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      SESSION_SECRET: "${SESSION_SECRET:-}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid profile email}"
      OIDC_POST_LOGOUT_REDIRECT_URI: "${OIDC_POST_LOGOUT_REDIRECT_URI:-}"
      OIDC_ALLOWED_EMAILS: "${OIDC_ALLOWED_EMAILS:-}"
      OIDC_ALLOWED_DOMAINS: "${OIDC_ALLOWED_DOMAINS:-}"
      SESSION_TTL_HOURS: "${SESSION_TTL_HOURS:-168}"
      # Notifications. Channel targets are set per-user in the app; only the
      # shared infrastructure lives here (SMTP relay, Apprise API, VAPID keys).
      APP_BASE_URL: "${APP_BASE_URL:-}"
      NOTIFY_TRIGGER: "${NOTIFY_TRIGGER:-status_change}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      APPRISE_API_URL: "${APPRISE_API_URL:-}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
    volumes:
      - selfparcel-data:/data

  # Optional: run Apprise API as a sidecar to fan out to 80+ services.
  # Then set APPRISE_API_URL=http://apprise:8000/notify and APPRISE_URLS=...
  # apprise:
  #   image: caronc/apprise:latest
  #   container_name: selfparcel-apprise
  #   restart: unless-stopped

volumes:
  selfparcel-data:
